# Model routing rules.
# Each model declares the column subtypes it requires, optionally uses, and accepts as fallback.
# Adding a new model = add an entry here + create a pipeline file. No core code changes needed.
#
# Scoring formula (in config_assembler.py):
#   score = (required subtypes ALL satisfied → 1.0 per required, else 0 total)
#         + (optional subtypes present × 0.3)
#         + (preferred_measures matched × 0.5)
# A model is only a candidate when ALL required subtypes are satisfied.
#
# Subtypes available for routing:
#   date | measure | geography | segment | channel | key | flag |
#   unclassified_metric | dimension_attribute | unknown
#
# "channel" = pharma promotional/engagement channel columns (f2f, email, samples, digital media, etc.)
# MMM is GATED on channel — it will not fire without channel data present.

BOCPD:
  required:
    - date
    - measure
  optional:
    - geography
    - segment
  accepts:
    - unclassified_metric
  preferred_measures:
    - persistency
    - trx
    - nrx
    - nbrx
    - adherence_ratio
    - total_claims
  description: "Trend-shift (changepoint) detection on weekly time series"
  use_case_hints:
    - "Weekly persistency trend across territory (Patient Analytics)"
    - "Weekly TRx/NRx trend across territory (Provider Analytics)"

MMM:
  required:
    - date
    - measure
    - channel
  optional:
    - geography
    - segment
  accepts:
    - unclassified_metric
  preferred_measures:
    - trx
    - nrx
    - sales
    - total_sales
    - market_share
  description: "Marketing mix attribution — requires engagement channel data"
  use_case_hints:
    - "Decompose sales/TRx drivers across promotional channels"
    - "Estimate ROI and optimal channel mix"
    - "Quantify HCP reach, frequency, and engagement saturation"

PSI:
  required:
    - date
    - measure
    - segment
  optional:
    - geography
  accepts:
    - unclassified_metric
  preferred_measures:
    - patient_count
    - total_patients
    - treated_patients
    - net_flow
  description: "Population / segment drift detection"
  use_case_hints:
    - "Detect shifts in patient segment distribution over time"
    - "Monitor drug holiday or LOT progression drift"

ARIMA:
  required:
    - date
    - measure
  optional:
    - geography
  accepts:
    - unclassified_metric
  preferred_measures:
    - trx
    - nrx
    - persistency
    - market_share
    - patient_count
    - sales
  description: "Seasonal trend modeling (ARIMA / SARIMA / Prophet)"
  note: "Fallback time-series model when BOCPD has no clear changepoint hypothesis"
  use_case_hints:
    - "Forecast weekly TRx over next N periods"
    - "Decompose seasonality in market size"
